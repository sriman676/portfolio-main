name: CI/CD Pipeline & SecOps

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  NEXT_TELEMETRY_DISABLED: 1   # Suppress the interactive telemetry prompt
  CI: true

jobs:
  build_and_audit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'       # LTS — avoids Node 20 deprecation warning
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run Build
      run: npm run build

    - name: Security Check (npm audit)
      run: npm audit --audit-level=critical   # Only block on CRITICAL, not high
      continue-on-error: true                 # Non-blocking — informational only

    - name: Code Quality (Lint)
      run: npm run lint
      continue-on-error: true   # Non-blocking until ESLint config is strict
